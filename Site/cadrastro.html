<html>
<head>
	<meta charset="utf-8">
	<title>Cadastro</title>
	<link rel="stylesheet" type="text/css" href="trabalholairce.css">

	<script type="text/javascript">
	  function validar(){
	  	var nome = from1.nome.value;
	  	if (nome == ""){
	  		alert("Preencha o campo Nome!");
	  		return false;}

	  	var data = from1.data.value;
	  	else if (data == ""){
	  		alert("Preencha o campo Data!");
	  		return false;}

	  	var cpf = from1.cpf.value;
	  	else if (cpf == ""){
	  		alert("Prenencha o campo CPF!");
	  		return false;}

	  	var email = from1.email.value;
	    else if (email == "" || email.indexOf("@") == -1){
	  		alert("Prenencha o campo Email corretamente!");
	  		return false;}

	  	var senha = from1.senha.value;
	  	else if (senha == "" || senha.length < 4 || senha.length > 8){
          alert("Digite uma senha de 4 a 8 caracteries");
	  	   return false;}

        var conf_senha = from1.conf_senha.value;
		else if (conf_senha != senha){ 	
             alert("As senhas não se corresponden");
                return false;}


	  	var celular = from1.celular.value;
	  	else if (celular == "" ){
          alert("Preencha o Campo Celular");
	  	   return false;}

	  	    var cep = from1.cep.value;
	  	else if (cep == "" ){
          alert("Preencha o Campo Cep");
	  	   return false;}

	  	   var endereco = from1.endereco.value;
	  	else if (endereco == ""){
	  		alert("Preencha o campo Endereço!");
	  		return false;}

	</script>
</head>

        <label>Email :</label>

		<label>Senha :</label>

		<label>Confirmar Senha :</label>

		<label>Celular :</label>

		<label>CEP :</label>

		<label>Endereço :</label>
